<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FR｜67 SPEED - ULTIMATE CEO EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-pink: #ff007f;
            --glass: rgba(255, 255, 255, 0.1);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* 霓虹動態背景 */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background: radial-gradient(circle, #050505 0%, #111 50%, #000 100%);
            z-index: -1; animation: rotateBg 20s linear infinite;
        }

        /* 主容器 */
        .container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 100px 1fr 100px;
            height: 100vh; width: 100vw;
            gap: 20px; padding: 20px;
            box-sizing: border-box;
        }

        /* 標題區 */
        .header {
            grid-column: 1 / 4;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-blue); padding: 0 40px;
            border-radius: 15px;
        }

        .header h1 { 
            font-size: 2rem; letter-spacing: 10px; color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue); margin: 0;
        }

        /* 視覺偵測區 (大螢幕) */
        .main-view {
            grid-column: 2; grid-row: 2;
            position: relative; border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; background: #000;
        }
        #webcam { display: none; }
        #output_canvas { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }

        /* 排行榜 (左側) */
        .side-panel {
            grid-row: 2; background: var(--glass);
            backdrop-filter: blur(10px); border-radius: 15px;
            padding: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .stats-title { color: var(--neon-pink); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; }
        .data-item { margin-bottom: 20px; }
        .data-label { font-size: 0.7rem; color: #888; }
        .data-value { font-size: 1.5rem; color: #fff; font-weight: bold; }

        /* 計分大字 (浮動在畫面上) */
        .score-overlay {
            position: absolute; top: 20px; right: 40px;
            text-align: right; pointer-events: none;
        }
        .score-big { font-size: 8rem; line-height: 1; color: var(--neon-blue); font-weight: 900; }

        /* 控制區 (底部) */
        .footer {
            grid-column: 1 / 4; display: flex; justify-content: center; align-items: center;
        }
        .btn-start {
            background: transparent; border: 2px solid var(--neon-blue);
            color: var(--neon-blue); padding: 15px 80px; font-size: 1.5rem;
            border-radius: 50px; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .btn-start:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }

        /* 能量條 GUI */
        .power-bar-container { position: absolute; bottom: 20px; width: 90%; left: 5%; height: 10px; background: #222; border-radius: 5px; }
        #powerBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); border-radius: 5px; transition: 0.1s; }

        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>FR TECHNOLOGY</h1>
            <div id="timer" style="color: var(--neon-pink); font-size: 1.5rem;">SYSTEM STANDBY</div>
        </div>

        <div class="side-panel">
            <div class="stats-title">🌍 GLOBAL STATS</div>
            <div class="data-item">
                <div class="data-label">全服歷史次數</div>
                <div class="data-value" id="globalTotal">---</div>
            </div>
            <div class="data-item">
                <div class="data-label">世界單次最高分</div>
                <div class="data-value" id="globalBest">---</div>
            </div>
            <hr style="border: 0.5px solid #333;">
            <div class="stats-title" style="margin-top: 20px;">👤 SESSION</div>
            <div class="data-item">
                <div class="data-label">本次挑戰最高分</div>
                <div class="data-value" id="sessionBest">0</div>
            </div>
        </div>

        <div class="main-view" id="gameArea">
            <video id="webcam"></video>
            <canvas id="output_canvas"></canvas>
            
            <div class="score-overlay">
                <div style="font-size: 1rem; color: var(--neon-blue);">SWING SPEED</div>
                <div class="score-big" id="score">00</div>
            </div>

            <div class="power-bar-container">
                <div id="powerBar"></div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-start" id="startBtn">啟動系統 & 挑戰</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 你的 Firebase 身分證
        const firebaseConfig = {
            apiKey: "AIzaSyDUwqS9JFHgfEeW2Yk2gDE3evco4hUNsdM",
            authDomain: "fr-67-speed-df7c9.firebaseapp.com",
            projectId: "fr-67-speed-df7c9",
            databaseURL: "https://fr-67-speed-df7c9-default-rtdb.asia-southeast1.firebasedatabase.app",
            appId: "1:634537813920:web:bc10e38101935e395066c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 雲端數據更新
        db.ref('stats').on('value', (s) => {
            const data = s.val() || { total: 0, best: 0 };
            document.getElementById('globalTotal').innerText = data.total.toLocaleString();
            document.getElementById('globalBest').innerText = data.best;
            window.cloud = data;
        });

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        let count = 0, isRunning = false, sessionBest = 0;
        let lastY = { Left: 0, Right: 0 };

        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            ctx.save();
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(results.image, 0,0,canvas.width,canvas.height);

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((marks, index) => {
                    const side = results.multiHandedness[index].label;
                    const y = marks[8].y; // 食指尖
                    
                    if (isRunning && Math.abs(y - lastY[side]) > 0.1) {
                        count++;
                        document.getElementById('score').innerText = count.toString().padStart(2, '0');
                        document.getElementById('powerBar').style.width = (count % 100) + "%";
                    }
                    lastY[side] = y;

                    // 繪製專業 GUI 骨架
                    drawConnectors(ctx, marks, HAND_CONNECTIONS, {color: '#00f2ff', lineWidth: 4});
                    drawLandmarks(ctx, marks, {color: '#ff007f', lineWidth: 1, radius: 2});
                });
            }
            ctx.restore();
        });

        const camera = new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 1280, height: 720 });
        camera.start();

        startBtn.onclick = () => {
            // 進入全螢幕
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            
            isRunning = true; count = 0;
            document.getElementById('score').innerText = "00";
            startBtn.disabled = true;
            
            let time = 20;
            document.getElementById('timer').innerText = `SYSTEM ACTIVE: ${time}s`;
            
            const clock = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = `SYSTEM ACTIVE: ${time}s`;
                if (time <= 0) {
                    clearInterval(clock);
                    isRunning = false;
                    startBtn.disabled = false;
                    document.getElementById('timer').innerText = "CHALLENGE COMPLETE";
                    if (count > sessionBest) {
                        sessionBest = count;
                        document.getElementById('sessionBest').innerText = sessionBest;
                    }
                    upload(count);
                }
            }, 1000);
        };

        function upload(score) {
            const total = (window.cloud.total || 0) + score;
            const best = Math.max(window.cloud.best || 0, score);
            db.ref('stats').set({ total, best });
        }
    </script>
</body>
</html>
