<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FR｜67 SPEED - MediaPipe AI 專業版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <style>
        :root { --fr-blue: #00d4ff; --fr-bg: #050508; }
        body { background: var(--fr-bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .vision-container { position: relative; width: 80%; height: 65vh; border: 3px solid #333; border-radius: 20px; overflow: hidden; }
        #webcam { display: none; } /* 隱藏原始影像，改顯示繪圖層 */
        #output_canvas { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        .ui-layer { position: absolute; top: 20px; text-align: center; width: 100%; pointer-events: none; }
        .counter { font-size: 8rem; font-weight: 900; color: var(--fr-blue); text-shadow: 0 0 20px var(--fr-blue); }
        .btn-start { background: var(--fr-blue); border: none; padding: 20px 60px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 0 15px var(--fr-blue); }
        .btn-start:disabled { background: #333; color: #666; box-shadow: none; }
    </style>
</head>
<body>

    <div class="vision-container" id="gameArea">
        <video id="webcam"></video>
        <canvas id="output_canvas"></canvas>
        <div class="ui-layer">
            <div id="timer" style="font-size: 2rem; color: #ff4757;">READY</div>
            <div class="counter" id="score">0</div>
        </div>
    </div>

    <button class="btn-start" id="startBtn">進入全螢幕並啟動 AI</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // --- Firebase 配置 (請保持你的 Key) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDUwqS9JFHgfEeW2Yk2gDE3evco4hUNsdM",
            authDomain: "fr-67-speed-df7c9.firebaseapp.com",
            projectId: "fr-67-speed-df7c9",
            databaseURL: "https://fr-67-speed-df7c9-default-rtdb.asia-southeast1.firebasedatabase.app",
            appId: "1:634537813920:web:bc10e38101935e395066c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- MediaPipe 手部追蹤設定 ---
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        let count = 0;
        let isRunning = false;
        let lastPos = { Left: 0, Right: 0 };

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && isRunning) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const label = results.multiHandedness[i].label; // "Left" 或 "Right"
                    
                    // 取得食指指尖位置
                    const currentY = landmarks[8].y;
                    
                    // 偵測揮動 (快速由上往下或由下往上)
                    if (Math.abs(currentY - lastPos[label]) > 0.15) {
                        count++;
                        document.getElementById('score').innerText = count;
                    }
                    lastPos[label] = currentY;

                    // 畫出 AI 骨架 (CEO 專業感)
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00d4ff', lineWidth: 5});
                    drawLandmarks(canvasCtx, landmarks, {color: '#ff4757', lineWidth: 2});
                }
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();

        // --- 遊戲控制 ---
        document.getElementById('startBtn').onclick = () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            isRunning = true;
            count = 0;
            document.getElementById('startBtn').disabled = true;
            
            let time = 20;
            const timer = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = time + "s";
                if (time <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('timer').innerText = "DONE!";
                    upload(count);
                }
            }, 1000);
        };

        function upload(score) {
            db.ref('stats').once('value').then(s => {
                const data = s.val() || { total: 0, best: 0 };
                db.ref('stats').set({
                    total: data.total + score,
                    best: Math.max(data.best, score)
                });
            });
        }
    </script>
</body>
</html>
