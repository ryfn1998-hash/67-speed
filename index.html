<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FR｜AI Monitoring System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(0, 0, 0, 0.7); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* 全螢幕背景相機 */
        .camera-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8) contrast(1.2); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 左上角懸浮統計視窗 */
        .floating-panel {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            width: 220px; background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .panel-header { font-size: 10px; color: var(--neon); letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; }
        
        /* 統計選單樣式 */
        .stat-select-box {
            background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff;
            width: 100%; padding: 8px; border-radius: 6px; outline: none;
            cursor: pointer; font-size: 14px; margin-top: 5px;
        }
        
        .current-count { margin-top: 15px; }
        .count-val { font-size: 32px; font-weight: 800; color: var(--neon); }
        .count-label { font-size: 12px; color: #aaa; }

        /* 系統狀態點 */
        .status-dot {
            display: inline-block; width: 8px; height: 8px; background: #ff4b4b;
            border-radius: 50%; margin-right: 5px; animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="camera-background">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="floating-panel">
        <div class="panel-header">
            <span class="status-dot"></span> LIVE SCANNER
        </div>
        
        <div class="count-label">目標類型切換</div>
        <select id="targetSelect" class="stat-select-box">
            <option value="person">🚶 人員 (Person)</option>
            <option value="car">🚗 車輛 (Car)</option>
            <option value="cell phone">📱 手機 (Phone)</option>
            <option value="laptop">💻 筆電 (Laptop)</option>
            <option value="chair">🪑 椅子 (Chair)</option>
            <option value="bottle">🍼 瓶子 (Bottle)</option>
        </select>

        <div class="current-count">
            <div class="count-val" id="displayNum">0</div>
            <div class="count-label" id="displayName">偵測中...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Firebase 配置 (CEO 專屬)
        const firebaseConfig = {
            apiKey: "AIzaSyDUwqS9JFHgfEeW2Yk2gDE3evco4hUNsdM",
            authDomain: "fr-67-speed-df7c9.firebaseapp.com",
            projectId: "fr-67-speed-df7c9",
            databaseURL: "https://fr-67-speed-df7c9-default-rtdb.asia-southeast1.firebasedatabase.app",
            appId: "1:634537813920:web:bc10e38101935e395066c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const targetSelect = document.getElementById('targetSelect');
        let model;

        async function init() {
            model = await cocoSsd.load();
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } // 優先使用後鏡頭
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                detectFrame();
            };
        }

        async function detectFrame() {
            const predictions = await model.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let currentStats = {};
            const selectedType = targetSelect.value;

            predictions.forEach(p => {
                // 畫偵測線 (高科技透視感)
                ctx.strokeStyle = "#00f2ff";
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]); // 虛線增加透視感
                ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
                ctx.setLineDash([]); 

                // 畫角標
                ctx.fillStyle = "#00f2ff";
                ctx.font = "12px monospace";
                ctx.fillText(p.class.toUpperCase(), p.bbox[0], p.bbox[1] - 5);

                currentStats[p.class] = (currentStats[p.class] || 0) + 1;
            });

            // 更新左上角懸浮視窗
            const count = currentStats[selectedType] || 0;
            document.getElementById('displayNum').innerText = count;
            document.getElementById('displayName').innerText = `目前偵測到 ${selectedType} 數量`;

            // 同步資料庫 (CEO 遠端監控用)
            if (Date.now() % 200 < 50) {
                db.ref('fr_monitor').set({
                    active_target: selectedType,
                    count: count,
                    all_objects: currentStats,
                    timestamp: Date.now()
                });
            }

            requestAnimationFrame(detectFrame);
        }

        init();
    </script>
</body>
</html>
